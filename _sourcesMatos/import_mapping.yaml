# AQUABLUE — racine (déjà importé en prod, conservé pour compléments)
GILETS AQB:
  structure_slug: aquablue
  type_slug: bcd
  file: "GILETS *.xlsm"
  parser: fiche_epi

MASQUES AQB:
  structure_slug: aquablue
  type_slug: mask
  file: "MASQUES *.xlsm"
  parser: fiche_epi

DETENDEURS AQB:
  structure_slug: aquablue
  type_slug: regulator
  sources:
    - path: "DET Révision/*.xls"
      parser: detendeur_form
    - path: "DET Réparation/*.xlsx"
      parser: detendeur_repair

