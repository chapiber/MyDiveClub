<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Accès — Portail Club</title>
  <meta name="theme-color" content="#132534">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="assets/icons/icon-192.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/portal.css?v=__BUILD_VERSION__">
  <script src="assets/js/club-auth.js?v=__BUILD_VERSION__"></script>
</head>
<body>
  <main class="login-page">
    <div class="login-page__brand">
      <div class="portal__club-strip" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <ul class="portal__club-logos" aria-label="Clubs du portail">
        <li><img class="portal__club-logo" src="assets/brand/logos/aquablue.jpg" alt="Aquablue" width="72" height="36"></li>
        <li><img class="portal__club-logo" src="assets/brand/logos/rederis.jpg" alt="Rederis" width="72" height="36"></li>
        <li><img class="portal__club-logo" src="assets/brand/logos/cerbere.jpeg" alt="Cap Cerbère" width="72" height="36"></li>
      </ul>
      <p class="portal__eyebrow">Banyuls · Cerbère</p>
      <h1 class="login-page__title">Portail Club</h1>
      <p class="login-page__lead">Mot de passe marcheron pour accéder aux outils moniteurs.</p>
    </div>

    <form id="login-form" class="login-card" novalidate>
      <label class="login-card__label" for="club-password">Mot de passe</label>
      <input
        id="club-password"
        class="login-card__input"
        type="password"
        name="password"
        autocomplete="current-password"
        required
        inputmode="text"
        autocapitalize="none"
        spellcheck="false"
      >
      <p id="login-error" class="login-card__error" role="alert" hidden>Mot de passe incorrect.</p>
      <button type="submit" class="login-card__submit">Entrer</button>
    </form>
  </main>

  <script>
    (function () {
      if (window.portailClubAuth && portailClubAuth.isAuthenticated()) {
        location.replace(portailClubAuth.getReturnUrl());
        return;
      }

      var form = document.getElementById('login-form');
      var input = document.getElementById('club-password');
      var error = document.getElementById('login-error');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        error.hidden = true;
        input.removeAttribute('aria-invalid');

        if (portailClubAuth.validatePassword(input.value)) {
          portailClubAuth.setAccessCookie();
          location.replace(portailClubAuth.getReturnUrl());
          return;
        }

        error.hidden = false;
        input.setAttribute('aria-invalid', 'true');
        input.focus();
      });
    })();
  </script>
</body>
</html>
