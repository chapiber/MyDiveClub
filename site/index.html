<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Portail Club</title>
  <meta name="description" content="Outils moniteurs — club de plongée. Accès rapide, optimisé mobile.">
  <meta name="theme-color" content="#132534">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Portail Club">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="stylesheet" href="assets/css/portal.css?v=__BUILD_VERSION__">
  <script>
    (function () {
      if (localStorage.getItem('portailClub_swMigrated') === '2') return;
      location.replace('/portailClub/update.html?to=' + encodeURIComponent(location.pathname + location.search + location.hash));
    })();
  </script>
  <script src="assets/js/club-auth.js?v=__BUILD_VERSION__"></script>
</head>
<body>
  <div class="portal">
    <header class="portal__top">
      <div class="portal__club-strip" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <ul class="portal__club-logos" aria-label="Clubs du portail">
        <li><img class="portal__club-logo" src="assets/brand/logos/aquablue.jpg" alt="Aquablue" width="120" height="48" loading="eager"></li>
        <li><img class="portal__club-logo" src="assets/brand/logos/rederis.jpg" alt="Rederis" width="120" height="48" loading="eager"></li>
        <li><img class="portal__club-logo" src="assets/brand/logos/cerbere.jpeg" alt="Cap Cerbère" width="120" height="48" loading="eager"></li>
      </ul>
      <p class="portal__eyebrow">Banyuls · Cerbère</p>
      <h1 class="portal__title">Portail Club</h1>
    </header>

    <nav class="apps" aria-label="Applications">
      <a href="apps/formations/index.html" class="app-tile">
        <span class="app-tile__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3L2 8l10 5 10-5-10-5z"/>
            <path d="M6 10v4c0 2.2 2.7 4 6 4s6-1.8 6-4v-4"/>
            <path d="M22 8v6"/>
            <circle cx="22" cy="16" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <span class="app-tile__label">Suivi Formation</span>
      </a>
      <a href="apps/materiel/index.html" class="app-tile">
        <span class="app-tile__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="7" width="18" height="13" rx="2"/>
            <path d="M8 7V5h8v2"/>
            <path d="M12 12v4"/>
            <path d="M10 14h4"/>
          </svg>
        </span>
        <span class="app-tile__label">Suivi Matériel</span>
      </a>
      <a href="apps/infos-club/index.html" class="app-tile">
        <span class="app-tile__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </span>
        <span class="app-tile__label">Infos club</span>
      </a>
      <a href="https://diveapps.serveblog.net/welcome/" class="app-tile app-tile--external" target="_blank" rel="noopener noreferrer">
        <svg class="app-tile__external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        <span class="app-tile__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </span>
        <span class="app-tile__label">MyDiveKit</span>
      </a>
      <a href="https://mabadive.com/login" class="app-tile app-tile--external app-tile--mabadive" id="mabadive-tile" data-launcher="mabadive">
        <svg class="app-tile__external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        <span class="app-tile__icon app-tile__icon--mabadive" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <path d="M8 14h.01"/>
            <path d="M12 14h.01"/>
            <path d="M16 14h.01"/>
            <path d="M8 18h.01"/>
            <path d="M12 18h.01"/>
          </svg>
        </span>
        <span class="app-tile__label">Mabadive</span>
      </a>
      <a href="https://carnet.ffessm.fr/" class="app-tile app-tile--external app-tile--ffessm-carnet" target="_blank" rel="noopener noreferrer">
        <svg class="app-tile__external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        <span class="app-tile__icon app-tile__icon--cover" aria-hidden="true">
          <img src="assets/brand/carnet-ffessm.jpeg" alt="" width="72" height="72" loading="lazy" decoding="async">
        </span>
        <span class="app-tile__label">FFESSM - Carnet plongée</span>
      </a>
    </nav>

    <footer class="portal__footer">
      <a href="install.html">Installer · QR code</a>
    </footer>
  </div>
  <script src="assets/js/app-update.js?v=__BUILD_VERSION__" defer></script>
  <script src="assets/js/portal.js?v=__BUILD_VERSION__" defer></script>
</body>
</html>
